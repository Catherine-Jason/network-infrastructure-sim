<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Network Simulator – Cisco Style</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            font-family: 'Segoe UI', 'Courier New', monospace;
            background: #0d1117;
            margin: 0;
            padding: 20px;
            color: #eee;
        }
        #app {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        #canvasContainer {
            background: #0a0f1a;
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid #1a2a3a;
        }
        #networkCanvas {
            background: #0d1117;
            border-radius: 8px;
            cursor: crosshair;
            display: block;
        }
        #controlsPanel {
            background: #0a0f1a;
            padding: 12px;
            border-radius: 12px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            border: 1px solid #1a2a3a;
        }
        button {
            background: #1e3a5f;
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: monospace;
        }
        button:hover { background: #2a5a8f; transform: scale(1.02); }
        #inspectorPanel, #terminal, #levelPanel {
            background: #0a0f1a;
            border-radius: 12px;
            padding: 12px;
            width: 270px;
            border: 1px solid #1a2a3a;
        }
        #terminal { display: none; flex-direction: column; }
        #terminalOutput {
            background: #00000033;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            padding: 6px;
            border-radius: 8px;
            font-size: 12px;
        }
        #terminalInput {
            background: #00000066;
            border: 1px solid #1e90ff;
            color: #eee;
            padding: 6px;
            margin-top: 8px;
            border-radius: 20px;
            font-family: monospace;
        }
        #taskList {
            list-style: none;
            padding: 0;
            margin-top: 12px;
        }
        .task-item {
            background: #00000033;
            margin: 6px 0;
            padding: 6px 8px;
            border-radius: 8px;
            font-size: 12px;
        }
        .task-item.completed {
            background: #1a3320;
            color: #88ff88;
            text-decoration: line-through;
            opacity: 0.8;
        }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.hidden { display: none; }
        .modal-content {
            background: #0a0f1a;
            padding: 20px;
            border-radius: 16px;
            width: 300px;
            text-align: center;
            border: 1px solid #1e90ff;
        }
        #levelButtons button {
            display: block;
            width: 100%;
            margin: 8px 0;
        }
        .popup {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1e3a5f;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: bold;
            z-index: 1000;
            font-family: monospace;
        }
        .popup.hidden { display: none; }
        .popup.error { background: #c44; }
        .popup.success { background: #4caf50; }
        #nextLevelBtn {
            margin-top: 12px;
            background: #4caf50;
        }
        .level-select-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: #1e90ff;
        }
        h3, #levelHeader {
            color: #5ab4ff;
            font-family: monospace;
        }
    </style>
</head>
<body>
<div id="app">
    <div id="canvasContainer">
        <canvas id="networkCanvas" width="1100" height="550"></canvas>
    </div>

    <div id="controlsPanel">
        <button id="btnAddRouter">🔵 Router</button>
        <button id="btnAddSwitch">🟢 Switch</button>
        <button id="btnAddPC">💻 PC</button>
        <button id="btnAddFirewall">🧱 Firewall</button>
        <button id="btnAddServer">📀 Server</button>
        <button id="btnAddCloud">☁️ Cloud</button>
        <button id="btnAddAP">📶 Access Point</button>
    </div>

    <div id="inspectorPanel">
        <h3>Inspector</h3>
        <div id="inspectorContent">Select a device</div>
    </div>

    <div id="terminal">
        <div id="terminalHeader">Terminal</div>
        <div id="terminalOutput"></div>
        <input type="text" id="terminalInput" placeholder="Enter command..." autocomplete="off">
    </div>

    <div id="levelPanel">
        <div id="levelHeader">📡 Current Level: <span id="levelName"></span></div>
        <div id="taskList"></div>
        <button id="nextLevelBtn" style="display:none;">Next Level →</button>
    </div>

    <div id="levelSelectModal" class="modal hidden">
        <div class="modal-content">
            <h2>Select Level</h2>
            <div id="levelButtons"></div>
            <button id="closeModal">Close</button>
        </div>
    </div>

    <div id="popup" class="hidden">Message</div>
</div>
<button id="levelSelectButton" class="level-select-btn">📚 Level Select</button>

<script>
// =========================================================================
// FULL NETWORK SIMULATOR – CISCO STYLE ICONS, DRAG LINKING, SELF-PACED LEVELS
// =========================================================================
window.App = window.App || {};

// ----------------------------- eventBus -----------------------------
App.EventBus = (function() {
    const listeners = {};
    function on(event, cb) { if (!listeners[event]) listeners[event] = []; listeners[event].push(cb); }
    function off(event, cb) { if (!listeners[event]) return; listeners[event] = listeners[event].filter(f => f !== cb); }
    function emit(event, data) { if (!listeners[event]) return; listeners[event].forEach(cb => { try { cb(data); } catch(e) { console.error(e); } }); }
    return { on, off, emit };
})();

// ----------------------------- utils -----------------------------
App.Utils = (function() {
    function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }
    function getRandomPosition(padding=100, maxX=1050, maxY=500) {
        return { x: padding + Math.random()*(maxX-padding*2), y: padding + Math.random()*(maxY-padding*2) };
    }
    function showPopup(msg, type='info', duration=2500) { App.EventBus.emit('showPopup', { message: msg, type, duration }); }
    return { generateId, getRandomPosition, showPopup };
})();

// ----------------------------- state (engine internal) -----------------------------
App.Engine = App.Engine || {};
let devices = [];
let links = [];
let selectedDeviceId = null;

App.Engine.getDevices = () => devices;
App.Engine.getLinks = () => links;
App.Engine.getSelectedDeviceId = () => selectedDeviceId;
App.Engine._setDevices = (d) => { devices = d; };
App.Engine._addDevice = (d) => { devices.push(d); };
App.Engine._removeDevice = (id) => { devices = devices.filter(d => d.id !== id); };
App.Engine._updateDevice = (d) => { const idx = devices.findIndex(x => x.id === d.id); if(idx!==-1) devices[idx]=d; };
App.Engine._setLinks = (l) => { links = l; };
App.Engine._addLink = (l) => { links.push(l); };
App.Engine._removeLink = (id) => { links = links.filter(l => l.id !== id); };
App.Engine._setSelectedDeviceId = (id) => { selectedDeviceId = id; };

// ----------------------------- deviceModel (extended) -----------------------------
App.DeviceModel = (function() {
    function createDevice(type, id, name, x, y) {
        const device = {
            id: id || App.Utils.generateId(),
            type: type,
            name: name || `${type}_${Math.floor(Math.random()*1000)}`,
            x: x || 200, y: y || 200,
            interfaces: []
        };
        // Assign interfaces based on type (simplified for now)
        if (type === 'router') {
            device.interfaces = [{ name: 'Gig0/0', ip: '', mask: '' }, { name: 'Gig0/1', ip: '', mask: '' }];
        } else if (type === 'switch') {
            device.interfaces = [{ name: 'Fa0/1', ip: '' }, { name: 'Fa0/2', ip: '' }, { name: 'Fa0/3', ip: '' }, { name: 'Fa0/4', ip: '' }];
        } else if (type === 'pc') {
            device.interfaces = [{ name: 'eth0', ip: '', mask: '' }];
        } else if (type === 'firewall') {
            device.interfaces = [{ name: 'eth0', ip: '' }, { name: 'eth1', ip: '' }];
        } else if (type === 'server') {
            device.interfaces = [{ name: 'eth0', ip: '' }];
        } else if (type === 'cloud') {
            device.interfaces = [{ name: 'Internet', ip: '' }];
        } else if (type === 'accessPoint') {
            device.interfaces = [{ name: 'wlan0', ip: '' }];
        }
        return device;
    }
    return { createDevice };
})();

// ----------------------------- engine (public mutations) -----------------------------
App.Engine.addDevice = (type, id, name, x, y) => {
    const device = App.DeviceModel.createDevice(type, id, name, x, y);
    App.Engine._addDevice(device);
    App.EventBus.emit('deviceAdded', device);
    return device;
};
App.Engine.addLink = (fromId, toId) => {
    const link = { id: App.Utils.generateId(), from: fromId, to: toId };
    App.Engine._addLink(link);
    App.EventBus.emit('linkCreated', link);
    return link;
};
App.Engine.removeDevice = (id) => {
    const linksToRemove = App.Engine.getLinks().filter(l => l.from === id || l.to === id);
    linksToRemove.forEach(l => App.Engine._removeLink(l.id));
    App.Engine._removeDevice(id);
    if (App.Engine.getSelectedDeviceId() === id) App.Engine._setSelectedDeviceId(null);
    App.EventBus.emit('deviceRemoved', id);
};
App.Engine.moveDevice = (id, x, y) => {
    const dev = App.Engine.getDevices().find(d => d.id === id);
    if (dev) { dev.x = x; dev.y = y; App.EventBus.emit('deviceMoved', id); }
};
App.Engine.selectDevice = (id) => {
    App.Engine._setSelectedDeviceId(id);
    App.EventBus.emit('deviceSelected', id);
};
App.Engine.clearSelection = () => {
    App.Engine._setSelectedDeviceId(null);
    App.EventBus.emit('deviceSelected', null);
};
App.Engine.loadScenario = (scenarioData) => {
    App.Engine._setDevices([]);
    App.Engine._setLinks([]);
    scenarioData.devices.forEach(devData => {
        const newDev = App.DeviceModel.createDevice(devData.type, devData.id, devData.name, devData.x, devData.y);
        if (devData.interfaces) newDev.interfaces = devData.interfaces;
        App.Engine._addDevice(newDev);
    });
    (scenarioData.links || []).forEach(linkData => {
        App.Engine.addLink(linkData.from, linkData.to);
    });
    App.EventBus.emit('scenarioLoaded', scenarioData.id);
};

// ----------------------------- pingEngine (simple) -----------------------------
App.PingEngine = (function() {
    let pingSuccesses = [];
    function recordPing(fromId, toId) {
        pingSuccesses.push({ from: fromId, to: toId });
        App.EventBus.emit('pingExecuted', { from: fromId, to: toId });
    }
    function getPingSuccesses() { return pingSuccesses; }
    function clearPings() { pingSuccesses = []; }
    function simulatePing(fromId, toId) {
        const fromDev = App.Engine.getDevices().find(d => d.id === fromId);
        const toDev = App.Engine.getDevices().find(d => d.id === toId);
        if (fromDev && toDev) {
            recordPing(fromId, toId);
            App.Utils.showPopup(`Ping from ${fromDev.name} to ${toDev.name} successful`, 'success');
            return true;
        }
        App.Utils.showPopup(`Ping failed: device not found`, 'error');
        return false;
    }
    return { simulatePing, getPingSuccesses, clearPings };
})();

// ----------------------------- levelValidator (unchanged logic) -----------------------------
App.LevelValidator = (function() {
    let currentLevel = null;
    let completedTasks = new Set();

    function setLevel(levelData) {
        currentLevel = levelData;
        completedTasks.clear();
        App.EventBus.emit('tasksUpdated', getTaskStatus());
    }
    function getTaskStatus() {
        if (!currentLevel) return [];
        return currentLevel.tasks.map(task => ({ ...task, completed: completedTasks.has(task.id) }));
    }
    function checkAllTasks() {
        if (!currentLevel) return;
        const allCompleted = currentLevel.tasks.every(task => completedTasks.has(task.id));
        if (allCompleted) {
            App.EventBus.emit('levelComplete', currentLevel.id);
            App.Utils.showPopup(`Level ${currentLevel.name} complete!`, 'success');
        }
        App.EventBus.emit('tasksUpdated', getTaskStatus());
    }
    function validateDeviceExists(deviceType, minCount = 1) {
        return App.Engine.getDevices().filter(d => d.type === deviceType).length >= minCount;
    }
    function validateLinkExists(deviceId1, deviceId2) {
        const links = App.Engine.getLinks();
        return links.some(l => (l.from === deviceId1 && l.to === deviceId2) || (l.from === deviceId2 && l.to === deviceId1));
    }
    function validatePingSuccess(fromId, toId) {
        return App.PingEngine.getPingSuccesses().some(p => p.from === fromId && p.to === toId);
    }
    function validateCommandExecuted(deviceId, command) {
        if (!window._commandHistory) window._commandHistory = [];
        return window._commandHistory.some(c => c.deviceId === deviceId && c.command === command);
    }
    function registerTaskCompletion(taskId) {
        if (completedTasks.has(taskId)) return;
        completedTasks.add(taskId);
        checkAllTasks();
    }
    function reevaluate() {
        if (!currentLevel) return;
        for (let task of currentLevel.tasks) {
            if (completedTasks.has(task.id)) continue;
            let isComplete = false;
            if (task.type === 'deviceExists') isComplete = validateDeviceExists(task.deviceType, task.minCount || 1);
            else if (task.type === 'linkExists') isComplete = validateLinkExists(task.between[0], task.between[1]);
            else if (task.type === 'pingSuccess') isComplete = validatePingSuccess(task.from, task.to);
            else if (task.type === 'commandExecuted') isComplete = validateCommandExecuted(task.deviceId, task.command);
            if (isComplete) registerTaskCompletion(task.id);
        }
    }
    App.EventBus.on('deviceAdded', reevaluate);
    App.EventBus.on('linkCreated', reevaluate);
    App.EventBus.on('deviceRemoved', reevaluate);
    App.EventBus.on('pingExecuted', reevaluate);
    App.EventBus.on('commandExecuted', (data) => {
        if (!window._commandHistory) window._commandHistory = [];
        window._commandHistory.push(data);
        reevaluate();
    });
    return { setLevel, getTaskStatus, reevaluate };
})();

// ----------------------------- progression (localStorage) -----------------------------
App.Progression = (function() {
    let allLevels = [];
    let currentLevelId = null;
    let completedLevels = new Set();

    function loadCompletedFromStorage() {
        const saved = localStorage.getItem('netSim_completed');
        if (saved) completedLevels = new Set(JSON.parse(saved));
    }
    function saveCompleted() { localStorage.setItem('netSim_completed', JSON.stringify([...completedLevels])); }
    function init(levelsArray) {
        allLevels = levelsArray;
        loadCompletedFromStorage();
        const firstIncomplete = allLevels.find(l => !completedLevels.has(l.id)) || allLevels[0];
        currentLevelId = firstIncomplete.id;
        loadLevel(currentLevelId);
    }
    function loadLevel(levelId) {
        const level = allLevels.find(l => l.id === levelId);
        if (!level) return false;
        currentLevelId = levelId;
        App.PingEngine.clearPings();
        window._commandHistory = [];
        App.Engine.loadScenario(level.initialScenario);
        App.LevelValidator.setLevel(level);
        App.EventBus.emit('levelLoaded', level);
        return true;
    }
    function completeCurrentLevel() {
        if (!currentLevelId) return;
        completedLevels.add(currentLevelId);
        saveCompleted();
        App.EventBus.emit('levelCompleted', currentLevelId);
        const nextLevel = allLevels.find(l => !completedLevels.has(l.id));
        if (nextLevel) {
            loadLevel(nextLevel.id);
            App.Utils.showPopup(`New level unlocked: ${nextLevel.name}`, 'success');
        } else {
            App.Utils.showPopup(`Congratulations! You've completed all levels!`, 'success');
        }
    }
    function getCurrentLevel() { return allLevels.find(l => l.id === currentLevelId); }
    function getUnlockedLevels() {
        return allLevels.filter((l, idx) => idx === 0 || completedLevels.has(allLevels[idx-1].id));
    }
    App.EventBus.on('levelComplete', (levelId) => {
        if (levelId === currentLevelId) completeCurrentLevel();
    });
    return { init, loadLevel, getCurrentLevel, getUnlockedLevels, completedLevels: () => [...completedLevels] };
})();

// ----------------------------- LEVELS (Practice + Basic Connectivity) -----------------------------
App.Levels = [
    {
        id: "level1_practice",
        name: "Practice Mode",
        tasks: [
            { id: "p1", type: "deviceExists", deviceType: "pc", minCount: 1, description: "There is a PC on the canvas" },
            { id: "p2", type: "commandExecuted", deviceId: "pc_practice", command: "ipconfig", description: "Type 'ipconfig' in the terminal" }
        ],
        initialScenario: {
            id: "level1_practice",
            devices: [ App.DeviceModel.createDevice("pc", "pc_practice", "PC-Practice", 300, 300) ],
            links: []
        }
    },
    {
        id: "level2_basicLAN",
        name: "Basic Connectivity",
        tasks: [
            { id: "l2t1", type: "deviceExists", deviceType: "switch", minCount: 1, description: "Add a switch" },
            { id: "l2t2", type: "deviceExists", deviceType: "pc", minCount: 2, description: "Add two PCs (PC-A and PC-B)" },
            { id: "l2t3", type: "linkExists", between: ["pcA","switch1"], description: "Connect PC-A to the switch" },
            { id: "l2t4", type: "linkExists", between: ["pcB","switch1"], description: "Connect PC-B to the switch" },
            { id: "l2t5", type: "pingSuccess", from: "pcA", to: "pcB", description: "Ping PC-B from PC-A successfully" }
        ],
        initialScenario: {
            id: "level2_basicLAN",
            devices: [
                App.DeviceModel.createDevice("switch", "switch1", "Switch1", 400, 200),
                App.DeviceModel.createDevice("pc", "pcA", "PC-A", 200, 300),
                App.DeviceModel.createDevice("pc", "pcB", "PC-B", 600, 300)
            ],
            links: []
        }
    }
];

// =========================================================================
// CANVAS RENDERER – EXACT SVG STYLE (Router, Switch, Firewall, Server, Cloud, Access Point)
// =========================================================================
App.CanvasRenderer = (function() {
    const canvas = document.getElementById('networkCanvas');
    const ctx = canvas.getContext('2d');
    const CONNECTOR_RADIUS = 6;

    // Helper: soft glow (simulates SVG filter)
    function setGlow(color, blur=3) {
        ctx.shadowColor = color;
        ctx.shadowBlur = blur;
    }
    function clearGlow() { ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; }

    // Get connector position (right edge, centered)
    function getConnector(device) {
        return { x: device.x + 25, y: device.y };
    }

    // ---------- ROUTER (cylinder + spokes) ----------
    function drawRouter(x, y, w, h, selected) {
        const cx = x + w/2;
        const topY = y;
        const bodyH = h;
        // Cylinder body
        ctx.beginPath();
        ctx.ellipse(cx, topY, w/2, 8, 0, 0, Math.PI*2);
        ctx.fillStyle = '#1e3a5f';
        ctx.fill();
        ctx.fillRect(x, topY, w, bodyH);
        ctx.beginPath();
        ctx.ellipse(cx, topY+bodyH, w/2, 8, 0, 0, Math.PI*2);
        ctx.fillStyle = '#163050';
        ctx.fill();
        ctx.strokeStyle = '#1e90ff';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.ellipse(cx, topY, w/2, 8, 0, 0, Math.PI*2);
        ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(cx, topY+bodyH, w/2, 8, 0, 0, Math.PI*2);
        ctx.stroke();
        // Spokes (routing lines)
        const centerX = cx, centerY = topY + bodyH/2;
        ctx.beginPath();
        ctx.moveTo(centerX, centerY); ctx.lineTo(centerX, topY-4);
        ctx.moveTo(centerX, centerY); ctx.lineTo(cx - w/3, topY+8);
        ctx.moveTo(centerX, centerY); ctx.lineTo(cx + w/3, topY+8);
        ctx.moveTo(centerX, centerY); ctx.lineTo(cx - w/3, topY+bodyH-8);
        ctx.moveTo(centerX, centerY); ctx.lineTo(cx + w/3, topY+bodyH-8);
        ctx.moveTo(centerX, centerY); ctx.lineTo(centerX, topY+bodyH+4);
        ctx.strokeStyle = '#1e90ff';
        ctx.lineWidth = 1.2;
        ctx.stroke();
        setGlow('#5ab4ff', 4);
        ctx.beginPath();
        ctx.arc(centerX, centerY, 4, 0, Math.PI*2);
        ctx.fillStyle = '#5ab4ff';
        ctx.fill();
        clearGlow();
        if (selected) { ctx.strokeStyle = '#ffff00'; ctx.lineWidth = 2.5; ctx.strokeRect(x-2, y-2, w+4, h+4); }
    }

    // ---------- SWITCH (rack-style with ports & LEDs) ----------
    function drawSwitch(x, y, w, h, selected) {
        ctx.fillStyle = '#1a3320';
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = '#00cc66';
        ctx.strokeRect(x, y, w, h);
        // Ports
        for (let i = 0; i < 6; i++) {
            ctx.fillStyle = '#00cc66';
            ctx.fillRect(x + 6 + i*8, y+8, 6, 4);
            ctx.fillRect(x + 6 + i*8, y+h-14, 6, 4);
        }
        // LEDs
        const ledColors = ['#00ff88', '#00ff88', '#ffcc00', '#00ff88', '#ff4444', '#00ff88'];
        for (let i = 0; i < 6; i++) {
            ctx.beginPath();
            ctx.arc(x + 9 + i*8, y+h-6, 2, 0, Math.PI*2);
            ctx.fillStyle = ledColors[i];
            setGlow('#00ff88', 2);
            ctx.fill();
            clearGlow();
        }
        if (selected) { ctx.strokeStyle = '#ffff00'; ctx.strokeRect(x-2, y-2, w+4, h+4); }
    }

    // ---------- PC (monitor + tower) ----------
    function drawPC(x, y, w, h, selected) {
        ctx.fillStyle = '#2a2a3a';
        ctx.fillRect(x+5, y+5, w-15, h-10);
        ctx.strokeStyle = '#aaaaff';
        ctx.strokeRect(x+5, y+5, w-15, h-10);
        ctx.fillStyle = '#1a1a2a';
        ctx.fillRect(x+8, y+8, w-21, h-16);
        ctx.fillStyle = '#3a3a4a';
        ctx.fillRect(x+w-18, y+h/2, 14, h/2);
        if (selected) { ctx.strokeStyle = '#ffff00'; ctx.strokeRect(x-2, y-2, w+4, h+4); }
    }

    // ---------- FIREWALL (brick wall + lock) ----------
    function drawFirewall(x, y, w, h, selected) {
        ctx.fillStyle = '#3a1a00';
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = '#ff6600';
        ctx.strokeRect(x, y, w, h);
        // Brick pattern
        for (let row = 0; row < 4; row++) {
            const offset = (row % 2 === 0) ? 0 : 12;
            for (let col = 0; col < 3; col++) {
                ctx.fillStyle = '#ff660033';
                ctx.fillRect(x + 4 + col*22 + offset, y + 6 + row*12, 18, 8);
                ctx.strokeStyle = '#ff6600';
                ctx.strokeRect(x + 4 + col*22 + offset, y + 6 + row*12, 18, 8);
            }
        }
        // Lock icon
        setGlow('#ff8833', 4);
        ctx.font = "18px 'Segoe UI'";
        ctx.fillStyle = '#ff8833';
        ctx.fillText("🔒", x+w/2-10, y+h/2+6);
        clearGlow();
        if (selected) { ctx.strokeStyle = '#ffff00'; ctx.strokeRect(x-2, y-2, w+4, h+4); }
    }

    // ---------- SERVER (rack unit) ----------
    function drawServer(x, y, w, h, selected) {
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = '#9966ff';
        ctx.strokeRect(x, y, w, h);
        for (let i = 0; i < 3; i++) {
            ctx.fillStyle = '#2a1a4e';
            ctx.fillRect(x+4, y+6 + i*22, w-8, 16);
            ctx.strokeStyle = '#9966ff';
            ctx.strokeRect(x+4, y+6 + i*22, w-8, 16);
            ctx.beginPath();
            ctx.arc(x+w-12, y+14 + i*22, 3, 0, Math.PI*2);
            ctx.fillStyle = (i===1) ? '#00ff88' : '#9966ff';
            setGlow('#9966ff', 2);
            ctx.fill();
            clearGlow();
        }
        if (selected) { ctx.strokeStyle = '#ffff00'; ctx.strokeRect(x-2, y-2, w+4, h+4); }
    }

    // ---------- CLOUD (network cloud + internal nodes) ----------
    function drawCloud(x, y, w, h, selected) {
        const cx = x + w/2, cy = y + h/2;
        ctx.beginPath();
        ctx.ellipse(cx-15, cy-5, 18, 14, 0, 0, Math.PI*2);
        ctx.ellipse(cx, cy-10, 22, 16, 0, 0, Math.PI*2);
        ctx.ellipse(cx+15, cy-5, 18, 14, 0, 0, Math.PI*2);
        ctx.ellipse(cx, cy+8, 24, 16, 0, 0, Math.PI*2);
        ctx.fillStyle = '#0a2a3a';
        ctx.fill();
        ctx.strokeStyle = '#00ccff';
        ctx.lineWidth = 1.8;
        ctx.stroke();
        // Internal nodes & lines
        setGlow('#00ccff', 2);
        for (let i = -1; i <= 1; i++) {
            ctx.beginPath();
            ctx.arc(cx + i*12, cy, 3, 0, Math.PI*2);
            ctx.fillStyle = '#00ccff';
            ctx.fill();
        }
        ctx.beginPath();
        ctx.moveTo(cx-12, cy); ctx.lineTo(cx, cy-6); ctx.lineTo(cx+12, cy);
        ctx.strokeStyle = '#00ccff';
        ctx.lineWidth = 1;
        ctx.stroke();
        clearGlow();
        if (selected) { ctx.strokeStyle = '#ffff00'; ctx.strokeRect(x-2, y-2, w+4, h+4); }
    }

    // ---------- ACCESS POINT (Wi-Fi arcs) ----------
    function drawAccessPoint(x, y, w, h, selected) {
        const cx = x + w/2, cy = y + h/2;
        // Wi-Fi arcs
        for (let r = 12; r <= 30; r+=9) {
            ctx.beginPath();
            ctx.arc(cx, cy-6, r, -0.8, 0.8, false);
            ctx.strokeStyle = '#ffcc00';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        ctx.beginPath();
        ctx.arc(cx, cy-6, 6, 0, Math.PI*2);
        ctx.fillStyle = '#ffcc00';
        ctx.fill();
        // Base
        ctx.fillStyle = '#2a2200';
        ctx.fillRect(x+10, y+h-12, w-20, 10);
        ctx.strokeStyle = '#ffcc00';
        ctx.strokeRect(x+10, y+h-12, w-20, 10);
        if (selected) { ctx.strokeStyle = '#ffff00'; ctx.strokeRect(x-2, y-2, w+4, h+4); }
    }

    // ---------- MAIN DRAWING ----------
    function drawDevices() {
        const devices = App.Engine.getDevices();
        devices.forEach(dev => {
            const x = dev.x - 25, y = dev.y - 20, w = 50, h = 40;
            const selected = (App.Engine.getSelectedDeviceId() === dev.id);
            if (dev.type === 'router') drawRouter(x, y, w, h, selected);
            else if (dev.type === 'switch') drawSwitch(x, y, w, h, selected);
            else if (dev.type === 'pc') drawPC(x, y, w, h, selected);
            else if (dev.type === 'firewall') drawFirewall(x, y, w, h, selected);
            else if (dev.type === 'server') drawServer(x, y, w, h, selected);
            else if (dev.type === 'cloud') drawCloud(x, y, w, h, selected);
            else if (dev.type === 'accessPoint') drawAccessPoint(x, y, w, h, selected);
            else { ctx.fillStyle = '#aaa'; ctx.fillRect(x, y, w, h); }
            ctx.font = 'bold 10px "Courier New", monospace';
            ctx.fillStyle = '#ccccff';
            ctx.fillText(dev.name, x+5, y-3);
            const conn = getConnector(dev);
            ctx.beginPath();
            ctx.arc(conn.x, conn.y, CONNECTOR_RADIUS, 0, Math.PI*2);
            ctx.fillStyle = '#5ab4ff';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.stroke();
            dev.__connector = conn;
        });
    }

    function drawLinks() {
        const links = App.Engine.getLinks();
        const devices = App.Engine.getDevices();
        links.forEach(link => {
            const fromDev = devices.find(d => d.id === link.from);
            const toDev = devices.find(d => d.id === link.to);
            if (fromDev && toDev && fromDev.__connector && toDev.__connector) {
                ctx.beginPath();
                ctx.moveTo(fromDev.__connector.x, fromDev.__connector.y);
                ctx.lineTo(toDev.__connector.x, toDev.__connector.y);
                ctx.strokeStyle = '#88aaff';
                ctx.setLineDash([8,6]);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        });
    }

    function drawTempLink(start, end) {
        if (!start) return;
        ctx.beginPath();
        ctx.moveTo(start.x, start.y);
        ctx.lineTo(end.x, end.y);
        ctx.strokeStyle = '#ffaa33';
        ctx.setLineDash([6,8]);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    function render() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        drawLinks();
        drawDevices();
        const dragState = App.LinkController ? App.LinkController.getDragState() : null;
        if (dragState && dragState.active && dragState.startConnector)
            drawTempLink(dragState.startConnector, dragState.currentMouse);
    }

    function startLoop() { render(); setInterval(render, 50); }
    App.EventBus.on('deviceAdded', render);
    App.EventBus.on('deviceMoved', render);
    App.EventBus.on('linkCreated', render);
    App.EventBus.on('deviceSelected', render);
    App.EventBus.on('scenarioLoaded', render);
    App.EventBus.on('tempLinkUpdate', render);
    return { render, startLoop };
})();

// ----------------------------- UI Modules (inspector, controls, terminal, levelSelect, popup) -----------------------------
App.InspectorUI = (function() {
    const container = document.getElementById('inspectorContent');
    function update() {
        const id = App.Engine.getSelectedDeviceId();
        if (!id) { container.innerHTML = 'Select a device'; return; }
        const dev = App.Engine.getDevices().find(d => d.id === id);
        if (!dev) return;
        let html = `<strong>${dev.name}</strong> (${dev.type})<br>ID: ${dev.id}<hr><strong>Interfaces:</strong><ul>`;
        dev.interfaces.forEach(iface => { html += `<li>${iface.name} – IP: ${iface.ip || 'unset'}</li>`; });
        html += `</ul>`;
        container.innerHTML = html;
    }
    App.EventBus.on('deviceSelected', update);
    return { update };
})();

App.ControlsUI = (function() {
    function addDevice(type) {
        const pos = App.Utils.getRandomPosition();
        App.Controller.addDevice(type, pos.x, pos.y);
    }
    function bind() {
        document.getElementById('btnAddRouter').onclick = () => addDevice('router');
        document.getElementById('btnAddSwitch').onclick = () => addDevice('switch');
        document.getElementById('btnAddPC').onclick = () => addDevice('pc');
        document.getElementById('btnAddFirewall').onclick = () => addDevice('firewall');
        document.getElementById('btnAddServer').onclick = () => addDevice('server');
        document.getElementById('btnAddCloud').onclick = () => addDevice('cloud');
        document.getElementById('btnAddAP').onclick = () => addDevice('accessPoint');
    }
    return { bind };
})();

App.TerminalUI = (function() {
    const div = document.getElementById('terminal');
    const output = document.getElementById('terminalOutput');
    const input = document.getElementById('terminalInput');
    let activeDeviceId = null;
    function show(deviceId) {
        activeDeviceId = deviceId;
        div.style.display = 'flex';
        output.innerHTML = `Connected to ${App.Engine.getDevices().find(d=>d.id===deviceId)?.name}\n> `;
        input.value = ''; input.focus();
    }
    function hide() { div.style.display = 'none'; activeDeviceId = null; }
    function execute(cmd) {
        if (!activeDeviceId) return;
        const dev = App.Engine.getDevices().find(d => d.id === activeDeviceId);
        let response = '';
        if (cmd === 'ipconfig') {
            response = dev.interfaces.map(i => `${i.name}: ${i.ip || 'unset'}`).join('\n');
            App.EventBus.emit('commandExecuted', { deviceId: activeDeviceId, command: cmd });
        } else if (cmd.startsWith('ping ')) {
            const targetId = cmd.split(' ')[1];
            const targetDev = App.Engine.getDevices().find(d => d.name === targetId || d.id === targetId);
            if (targetDev) App.PingEngine.simulatePing(activeDeviceId, targetDev.id);
            else response = 'Device not found';
        } else { response = 'Command not recognized'; }
        if (response) output.innerHTML += `<br>> ${cmd}<br>${response}<br>> `;
        else output.innerHTML += `<br>> ${cmd}<br>> `;
        input.value = ''; output.scrollTop = output.scrollHeight;
    }
    input.addEventListener('keypress', e => { if(e.key === 'Enter') execute(input.value.trim()); });
    return { show, hide };
})();

App.LevelSelectUI = (function() {
    const modal = document.getElementById('levelSelectModal');
    const container = document.getElementById('levelButtons');
    const levelNameSpan = document.getElementById('levelName');
    const taskListDiv = document.getElementById('taskList');
    function updateTaskDisplay() {
        const level = App.Progression.getCurrentLevel();
        if (!level) return;
        levelNameSpan.innerText = level.name;
        const tasks = App.LevelValidator.getTaskStatus();
        taskListDiv.innerHTML = tasks.map(t => `<div class="task-item ${t.completed ? 'completed' : ''}">${t.description}</div>`).join('');
    }
    function renderLevelButtons() {
        const allLevels = window.App.Levels;
        const unlockedIds = App.Progression.getUnlockedLevels().map(l => l.id);
        container.innerHTML = allLevels.map(level => `
            <button ${!unlockedIds.includes(level.id) ? 'disabled' : ''} onclick="App.Progression.loadLevel('${level.id}')">
                ${level.name} ${App.Progression.completedLevels().includes(level.id) ? '✓' : ''}
            </button>
        `).join('');
    }
    function openModal() { modal.classList.remove('hidden'); renderLevelButtons(); }
    function closeModal() { modal.classList.add('hidden'); }
    document.getElementById('closeModal').onclick = closeModal;
    document.getElementById('nextLevelBtn').onclick = () => {
        const next = window.App.Levels.find(l => !App.Progression.completedLevels().includes(l.id));
        if (next) App.Progression.loadLevel(next.id);
    };
    App.EventBus.on('levelLoaded', () => { updateTaskDisplay(); document.getElementById('nextLevelBtn').style.display = 'none'; });
    App.EventBus.on('levelComplete', () => { document.getElementById('nextLevelBtn').style.display = 'block'; });
    App.EventBus.on('tasksUpdated', updateTaskDisplay);
    return { openModal, closeModal };
})();

App.PopupUI = (function() {
    const popup = document.getElementById('popup'); let timeout;
    function show(msg, type, duration) {
        if (timeout) clearTimeout(timeout);
        popup.textContent = msg; popup.className = `popup ${type}`; popup.classList.remove('hidden');
        timeout = setTimeout(() => popup.classList.add('hidden'), duration);
    }
    App.EventBus.on('showPopup', data => show(data.message, data.type, data.duration));
    return { show };
})();

// ----------------------------- Controller -----------------------------
App.Controller = (function() {
    function addDevice(type, x, y) { App.Engine.addDevice(type, null, `${type}_${Date.now()}`, x, y); }
    function selectDevice(id) { if (id) App.Engine.selectDevice(id); else App.Engine.clearSelection(); }
    function createLink(fromId, toId) {
        const exists = App.Engine.getLinks().some(l => (l.from===fromId && l.to===toId) || (l.from===toId && l.to===fromId));
        if (!exists) App.Engine.addLink(fromId, toId);
        else App.Utils.showPopup('Link already exists', 'info');
    }
    function moveDevice(id, x, y) { App.Engine.moveDevice(id, x, y); }
    return { addDevice, selectDevice, createLink, moveDevice };
})();

// ----------------------------- Drag Controller (move body) -----------------------------
App.DragController = (function() {
    const canvas = document.getElementById('networkCanvas');
    let dragging = null, offsetX, offsetY;
    function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width/rect.width, scaleY = canvas.height/rect.height;
        let x = (e.clientX-rect.left)*scaleX, y = (e.clientY-rect.top)*scaleY;
        x = Math.min(Math.max(0,x), canvas.width); y = Math.min(Math.max(0,y), canvas.height);
        return {x,y};
    }
    function onMouseDown(e) {
        const {x,y} = getCoords(e);
        for (let dev of App.Engine.getDevices()) {
            const dx = dev.x-25, dy = dev.y-20;
            if (x >= dx && x <= dx+50 && y >= dy && y <= dy+40) {
                dragging = dev; offsetX = x - dev.x; offsetY = y - dev.y; break;
            }
        }
    }
    function onMouseMove(e) {
        if (!dragging) return;
        const {x,y} = getCoords(e);
        dragging.x = x - offsetX; dragging.y = y - offsetY;
        App.Controller.moveDevice(dragging.id, dragging.x, dragging.y);
    }
    function onMouseUp() { dragging = null; }
    canvas.addEventListener('mousedown', onMouseDown);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    return {};
})();

// ----------------------------- Link Controller (drag connector) -----------------------------
App.LinkController = (function() {
    const canvas = document.getElementById('networkCanvas');
    let dragState = { active: false, startDevice: null, startConnector: null, currentMouse: {x:0,y:0} };
    function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width/rect.width, scaleY = canvas.height/rect.height;
        let x = (e.clientX-rect.left)*scaleX, y = (e.clientY-rect.top)*scaleY;
        x = Math.min(Math.max(0,x), canvas.width); y = Math.min(Math.max(0,y), canvas.height);
        return {x,y};
    }
    function onMouseDown(e) {
        const {x,y} = getCoords(e);
        for (let dev of App.Engine.getDevices()) {
            const conn = { x: dev.x + 25, y: dev.y };
            if (Math.hypot(x-conn.x, y-conn.y) <= 8) {
                dragState.active = true; dragState.startDevice = dev; dragState.startConnector = conn;
                dragState.currentMouse = {x,y}; e.preventDefault(); break;
            }
        }
    }
    function onMouseMove(e) {
        if (!dragState.active) return;
        dragState.currentMouse = getCoords(e);
        App.EventBus.emit('tempLinkUpdate', dragState);
    }
    function onMouseUp(e) {
        if (!dragState.active) return;
        const {x,y} = getCoords(e);
        let target = null;
        for (let dev of App.Engine.getDevices()) {
            if (dev.id === dragState.startDevice.id) continue;
            const dx = dev.x-25, dy = dev.y-20;
            if (x >= dx && x <= dx+50 && y >= dy && y <= dy+40) { target = dev; break; }
        }
        if (target) App.Controller.createLink(dragState.startDevice.id, target.id);
        else App.Utils.showPopup('Link cancelled', 'info');
        dragState.active = false;
        App.EventBus.emit('tempLinkUpdate', dragState);
    }
    function getDragState() { return dragState; }
    canvas.addEventListener('mousedown', onMouseDown);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    return { getDragState };
})();

// ----------------------------- Click & Terminal Controllers -----------------------------
App.ClickController = (function() {
    const canvas = document.getElementById('networkCanvas');
    function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width/rect.width, scaleY = canvas.height/rect.height;
        return { x: (e.clientX-rect.left)*scaleX, y: (e.clientY-rect.top)*scaleY };
    }
    function onClick(e) {
        const {x,y} = getCoords(e);
        let selected = null;
        for (let dev of App.Engine.getDevices()) {
            const dx = dev.x-25, dy = dev.y-20;
            if (x >= dx && x <= dx+50 && y >= dy && y <= dy+40) { selected = dev.id; break; }
        }
        App.Controller.selectDevice(selected);
    }
    canvas.addEventListener('click', onClick);
    return {};
})();

App.TerminalController = (function() {
    function onDeviceSelected(id) {
        if (id) {
            const dev = App.Engine.getDevices().find(d => d.id === id);
            if (dev && (dev.type === 'router' || dev.type === 'switch' || dev.type === 'pc' || dev.type === 'firewall' || dev.type === 'server')) {
                App.TerminalUI.show(id);
            } else App.TerminalUI.hide();
        } else App.TerminalUI.hide();
    }
    App.EventBus.on('deviceSelected', onDeviceSelected);
    return {};
})();

// ----------------------------- MAIN -----------------------------
(function() {
    App.Progression.init(App.Levels);
    App.CanvasRenderer.startLoop();
    App.ControlsUI.bind();
    document.getElementById('levelSelectButton').onclick = () => App.LevelSelectUI.openModal();
    console.log('Simulator ready – Cisco style with full icon set');
})();
</script>
