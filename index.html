<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Network Simulator | Cisco Style</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <div id="canvasContainer">
            <canvas id="networkCanvas" width="1200" height="600"></canvas>
        </div>

        <div id="controlsPanel">
            <button id="btnAddRouter">🔵 Router</button>
            <button id="btnAddSwitch">🟢 Switch</button>
            <button id="btnAddPC">💻 PC</button>
            <button id="btnAddCloud">☁️ Cloud</button>
        </div>

        <div id="inspectorPanel">
            <h3>Inspector</h3>
            <div id="inspectorContent">Select a device</div>
        </div>

        <div id="terminal">
            <div id="terminalHeader">Terminal</div>
            <div id="terminalOutput"></div>
            <input type="text" id="terminalInput" placeholder="Enter command..." autocomplete="off">
        </div>

        <div id="practicePanel">
            <div id="practiceHeader">Practice Mode — Level 1</div>
            <div id="practiceQuestion"></div>
            <div id="practiceExpected"></div>
            <input type="text" id="practiceInput" placeholder="Type the correct command...">
            <button id="practiceSubmit">Submit</button>
            <div id="practiceFeedback"></div>
        </div>

        <div id="popup" class="hidden">Message</div>
    </div>

    <!-- Load order: core, engine, ui, controller, main -->
    <script src="js/core/state.js"></script>
    <script src="js/core/eventBus.js"></script>
    <script src="js/core/utils.js"></script>

    <script src="js/engine/deviceModel.js"></script>
    <script src="js/engine/scenarioEngine.js"></script>
    <script src="js/engine/scenarioValidator.js"></script>
    <script src="js/engine/hintEngine.js"></script>
    <script src="js/engine/pingEngine.js"></script>
    <script src="js/engine/routingEngine.js"></script>
    <script src="js/engine/vlanEngine.js"></script>

    <script src="js/ui/canvasRenderer.js"></script>
    <script src="js/ui/inspectorUI.js"></script>
    <script src="js/ui/controlsUI.js"></script>
    <script src="js/ui/terminalUI.js"></script>
    <script src="js/ui/practiceUI.js"></script>
    <script src="js/ui/popupUI.js"></script>

    <script src="js/controller/controller.js"></script>
    <script src="js/controller/dragController.js"></script>
    <script src="js/controller/clickController.js"></script>
    <script src="js/controller/linkController.js"></script>
    <script src="js/controller/terminalController.js"></script>

    <script src="js/main.js"></script>
</body>
</html>
