<!DOCTYPE html>
<html>
<head>
    <title>Canvas Test</title>
</head>
<body>
    <canvas id="testCanvas" width="800" height="400" style="border:1px solid white;"></canvas>
    <script>
        const canvas = document.getElementById('testCanvas');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#1e3a5f';
        ctx.fillRect(100, 100, 50, 50);
        ctx.fillStyle = 'white';
        ctx.fillText('If you see a blue square, canvas works', 100, 180);
        console.log('Test script ran');
    </script>
</body>
</html>
