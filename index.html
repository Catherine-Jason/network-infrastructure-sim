<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Network Simulator – Cisco Style</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
    <div id="canvasContainer">
        <canvas id="networkCanvas" width="1100" height="550"></canvas>
    </div>
    <div id="controlsPanel">
        <button id="btnAddRouter">🔵 Router</button>
        <button id="btnAddSwitch">🟢 Switch</button>
        <button id="btnAddPC">💻 PC</button>
        <button id="btnAddFirewall">🧱 Firewall</button>
        <button id="btnAddServer">📀 Server</button>
        <button id="btnAddCloud">☁️ Cloud</button>
        <button id="btnAddAP">📶 Access Point</button>
    </div>
    <div id="inspectorPanel">
        <h3>Inspector</h3>
        <div id="inspectorContent">Select a device</div>
    </div>
    <div id="terminal">
        <div id="terminalHeader">Terminal</div>
        <div id="terminalOutput"></div>
        <input type="text" id="terminalInput" placeholder="Enter command..." autocomplete="off">
    </div>
    <div id="levelPanel">
        <div id="levelHeader">📡 Current Level: <span id="levelName"></span></div>
        <div id="taskList"></div>
        <button id="nextLevelBtn" style="display:none;">Next Level →</button>
    </div>
    <div id="levelSelectModal" class="modal hidden">
        <div class="modal-content">
            <h2>Select Level</h2>
            <div id="levelButtons"></div>
            <button id="closeModal">Close</button>
        </div>
    </div>
    <div id="popup" class="hidden">Message</div>
</div>
<button id="levelSelectButton" class="level-select-btn">📚 Level Select</button>

<!-- Load order: core first, then engine, then UI, then controllers, then main -->
<script src="js/eventBus.js"></script>
<script src="js/utils.js"></script>
<script src="js/state.js"></script>
<script src="js/engine.js"></script>
<script src="js/deviceModel.js"></script>
<script src="js/pingEngine.js"></script>
<script src="js/levelValidator.js"></script>
<script src="js/progression.js"></script>
<script src="js/levels.js"></script>
<script src="js/canvasRenderer.js"></script>
<script src="js/inspectorUI.js"></script>
<script src="js/controlsUI.js"></script>
<script src="js/terminalUI.js"></script>
<script src="js/levelSelectUI.js"></script>
<script src="js/popupUI.js"></script>
<script src="js/controller.js"></script>
<script src="js/dragController.js"></script>
<script src="js/linkController.js"></script>
<script src="js/clickController.js"></script>
<script src="js/terminalController.js"></script>
<script src="js/main.js"></script>
</body>
</html>
