<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Infrastructure Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="toolbar">
    <button onclick="addDevice('router')">Router 📡</button>
    <button onclick="addDevice('switch')">Switch 🔀</button>
    <button onclick="addDevice('pc')">PC 💻</button>
    <button onclick="startPingMode()">Ping 📡</button>
</div>


    <canvas id="networkCanvas"></canvas>
    <div id="inspectorPanel" class="inspector hidden">
    <h2>Device Inspector</h2>
    <p><strong>Type:</strong> <span id="inspType"></span></p>
    <p><strong>ID:</strong> <span id="inspId"></span></p>
    <p><strong>Status:</strong> <span id="inspState"></span></p>
    <p><strong>Connections:</strong></p>
    <ul id="inspConnections"></ul>

    <h3>Change State</h3>
    <button onclick="updateInspectorState('unconfigured')">Unconfigured</button>
    <button onclick="updateInspectorState('in-progress')">In‑Progress</button>
    <button onclick="updateInspectorState('configured')">Configured</button>

    <button class="closeBtn" onclick="closeInspector()">Close</button>
</div>


    <script src="main.js"></script>
</body>
</html>
