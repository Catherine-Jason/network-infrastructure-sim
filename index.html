<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Network Simulator – Cisco Style</title>
  <style>
    * { box-sizing: border-box; user-select: none; }
    body {
      background: #0d1117;
      font-family: 'Segoe UI', 'Courier New', monospace;
      margin: 0;
      padding: 20px;
      color: #eee;
    }
    #app {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    #canvasContainer {
      background: #0a0f1a;
      border-radius: 12px;
      padding: 8px;
      border: 1px solid #1a2a3a;
    }
    canvas {
      background: #0d1117;
      border-radius: 8px;
      cursor: crosshair;
      display: block;
    }
    #controlsPanel {
      background: #0a0f1a;
      padding: 12px;
      border-radius: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      border: 1px solid #1a2a3a;
    }
    button {
      background: #1e3a5f;
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      font-family: monospace;
    }
    button:hover { background: #2a5a8f; }
    #inspectorPanel, #terminal, #levelPanel {
      background: #0a0f1a;
      border-radius: 12px;
      padding: 12px;
      width: 270px;
      border: 1px solid #1a2a3a;
    }
    #terminal { display: none; flex-direction: column; }
    #terminalOutput {
      background: #00000033;
      height: 150px;
      overflow-y: auto;
      font-family: monospace;
      padding: 6px;
      font-size: 12px;
      white-space: pre-wrap;
    }
    #terminalInput {
      background: #00000066;
      border: 1px solid #1e90ff;
      color: #eee;
      padding: 6px;
      margin-top: 8px;
      border-radius: 20px;
    }
    .task-item {
      background: #00000033;
      margin: 6px 0;
      padding: 6px;
      border-radius: 8px;
      font-size: 12px;
    }
    .task-item.completed {
      background: #1a3320;
      color: #88ff88;
      text-decoration: line-through;
    }
    .modal {
      position: fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal.hidden { display: none; }
    .modal-content {
      background: #0a0f1a;
      padding: 20px;
      border-radius: 16px;
      width: 280px;
      text-align: center;
      border: 1px solid #1e90ff;
    }
    #levelButtons button {
      display: block;
      width: 100%;
      margin: 8px 0;
    }
    .popup {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #1e3a5f;
      padding: 8px 16px;
      border-radius: 40px;
      z-index: 1000;
    }
    .popup.hidden { display: none; }
    .popup.success { background: #4caf50; }
    #nextLevelBtn {
      margin-top: 12px;
      background: #4caf50;
    }
    .level-select-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: #1e90ff;
    }
    h3, #levelHeader { color: #5ab4ff; }
  </style>
</head>
<body>
<div id="app">
  <div id="canvasContainer">
    <canvas id="networkCanvas" width="1100" height="550"></canvas>
  </div>
  <div id="controlsPanel">
    <button id="btnAddRouter">🔵 Router</button>
    <button id="btnAddSwitch">🟢 Switch</button>
    <button id="btnAddPC">💻 PC</button>
    <button id="btnAddFirewall">🧱 Firewall</button>
    <button id="btnAddServer">📀 Server</button>
    <button id="btnAddCloud">☁️ Cloud</button>
    <button id="btnAddAP">📶 Access Point</button>
  </div>
  <div id="inspectorPanel">
    <h3>Inspector</h3>
    <div id="inspectorContent">Select a device</div>
  </div>
  <div id="terminal">
    <div id="terminalHeader">Terminal</div>
    <div id="terminalOutput"></div>
    <input id="terminalInput" type="text" placeholder="Enter command...">
  </div>
  <div id="levelPanel">
    <div id="levelHeader">📡 Current Level: <span id="levelName"></span></div>
    <div id="taskList"></div>
    <button id="nextLevelBtn" style="display:none;">Next Level →</button>
  </div>
  <div id="levelSelectModal" class="modal hidden">
    <div class="modal-content">
      <h2>Select Level</h2>
      <div id="levelButtons"></div>
      <button id="closeModal">Close</button>
    </div>
  </div>
  <div id="popup" class="popup hidden">Message</div>
</div>
<button id="levelSelectButton" class="level-select-btn">📚 Level Select</button>

<script>
// ============================================================
// FULLY FUNCTIONAL NETWORK SIMULATOR – CISCO STYLE ICONS
// ============================================================
(function(){
  // ----- STATE -----
  let devices = [];
  let links = [];
  let selectedDeviceId = null;
  let currentLevel = null;
  let completedTasks = new Set();
  let pingHistory = [];
  let commandHistory = [];
  let allLevels = [];
  let completedLevels = new Set();

  // Helper
  function genId() { return Date.now() + '-' + Math.random().toString(36).substr(2,6); }
  function showPopup(msg, type) {
    const popup = document.getElementById('popup');
    popup.textContent = msg;
    popup.className = `popup ${type}`;
    popup.classList.remove('hidden');
    setTimeout(() => popup.classList.add('hidden'), 2500);
  }

  // ----- DEVICE MODEL (Cisco types) -----
  function createDevice(type, id, name, x, y) {
    let interfaces = [];
    if (type === 'router') interfaces = [{name:'Gig0/0',ip:''},{name:'Gig0/1',ip:''}];
    else if (type === 'switch') interfaces = [{name:'Fa0/1',ip:''},{name:'Fa0/2',ip:''},{name:'Fa0/3',ip:''},{name:'Fa0/4',ip:''}];
    else if (type === 'pc') interfaces = [{name:'eth0',ip:''}];
    else if (type === 'firewall') interfaces = [{name:'eth0',ip:''},{name:'eth1',ip:''}];
    else if (type === 'server') interfaces = [{name:'eth0',ip:''}];
    else if (type === 'cloud') interfaces = [{name:'Internet',ip:''}];
    else if (type === 'accessPoint') interfaces = [{name:'wlan0',ip:''}];
    return { id: id || genId(), type, name: name || `${type}_${Math.floor(Math.random()*1000)}`, x, y, interfaces };
  }

  // ----- LEVEL DEFINITIONS -----
  allLevels = [
    { id: 'level1', name: 'Practice Mode', tasks: [
        { id:'p1', type:'deviceExists', deviceType:'pc', minCount:1, desc:'A PC exists on the canvas' },
        { id:'p2', type:'commandExecuted', deviceId:'pc_practice', command:'ipconfig', desc:"Type 'ipconfig' in the terminal" }
      ],
      init: () => { devices = [createDevice('pc','pc_practice','PC-Practice',300,300)]; links = []; }
    },
    { id: 'level2', name: 'Basic Connectivity', tasks: [
        { id:'l2t1', type:'deviceExists', deviceType:'switch', minCount:1, desc:'Add a switch' },
        { id:'l2t2', type:'deviceExists', deviceType:'pc', minCount:2, desc:'Add two PCs (PC-A and PC-B)' },
        { id:'l2t3', type:'linkExists', between:['pcA','switch1'], desc:'Connect PC-A to the switch' },
        { id:'l2t4', type:'linkExists', between:['pcB','switch1'], desc:'Connect PC-B to the switch' },
        { id:'l2t5', type:'pingSuccess', from:'pcA', to:'pcB', desc:'Ping PC-B from PC-A successfully' }
      ],
      init: () => {
        devices = [
          createDevice('switch','switch1','Switch1',400,200),
          createDevice('pc','pcA','PC-A',200,300),
          createDevice('pc','pcB','PC-B',600,300)
        ];
        links = [];
      }
    }
  ];

  // Load saved progress
  const saved = localStorage.getItem('netSim_completed');
  if (saved) completedLevels = new Set(JSON.parse(saved));

  function loadLevel(levelId) {
    const level = allLevels.find(l => l.id === levelId);
    if (!level) return;
    currentLevel = level;
    completedTasks.clear();
    pingHistory = [];
    commandHistory = [];
    level.init();
    selectedDeviceId = null;
    render();
    updateUI();
    showPopup(`Loaded: ${level.name}`, 'success');
  }

  function completeLevel() {
    if (!currentLevel) return;
    completedLevels.add(currentLevel.id);
    localStorage.setItem('netSim_completed', JSON.stringify([...completedLevels]));
    const next = allLevels.find(l => !completedLevels.has(l.id));
    if (next) loadLevel(next.id);
    else showPopup('All levels complete!', 'success');
  }

  // ----- VALIDATION -----
  function validateDeviceExists(type, minCount) { return devices.filter(d => d.type === type).length >= minCount; }
  function validateLinkExists(a,b) { return links.some(l => (l.from===a && l.to===b) || (l.from===b && l.to===a)); }
  function validatePingSuccess(from,to) { return pingHistory.some(p => p.from===from && p.to===to); }
  function validateCommand(deviceId, cmd) { return commandHistory.some(c => c.deviceId === deviceId && c.command === cmd); }

  function reevaluateTasks() {
    if (!currentLevel) return;
    for (let task of currentLevel.tasks) {
      if (completedTasks.has(task.id)) continue;
      let ok = false;
      if (task.type === 'deviceExists') ok = validateDeviceExists(task.deviceType, task.minCount);
      else if (task.type === 'linkExists') ok = validateLinkExists(task.between[0], task.between[1]);
      else if (task.type === 'pingSuccess') ok = validatePingSuccess(task.from, task.to);
      else if (task.type === 'commandExecuted') ok = validateCommand(task.deviceId, task.command);
      if (ok) { completedTasks.add(task.id); updateUI(); }
    }
    const allDone = currentLevel.tasks.every(t => completedTasks.has(t.id));
    document.getElementById('nextLevelBtn').style.display = allDone ? 'block' : 'none';
    if (allDone) showPopup(`Level ${currentLevel.name} complete!`, 'success');
  }

  // ----- CANVAS RENDERING (Cisco-style icons) -----
  const canvas = document.getElementById('networkCanvas');
  const ctx = canvas.getContext('2d');
  const CONNECTOR_RADIUS = 6;

  function setGlow(color, blur) { ctx.shadowColor = color; ctx.shadowBlur = blur; }
  function clearGlow() { ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; }
  function getConnector(dev) { return { x: dev.x + 25, y: dev.y }; }

  function drawRouter(x,y,w,h,sel) {
    const cx = x+w/2;
    ctx.beginPath();
    ctx.ellipse(cx, y, w/2, 6, 0, Math.PI*2);
    ctx.fillStyle = '#1e3a5f'; ctx.fill();
    ctx.fillRect(x, y, w, h);
    ctx.beginPath();
    ctx.ellipse(cx, y+h, w/2, 6, 0, Math.PI*2);
    ctx.fillStyle = '#163050'; ctx.fill();
    ctx.strokeStyle = '#1e90ff'; ctx.strokeRect(x, y, w, h);
    const cx2 = cx, cy2 = y + h/2;
    for (let i=0;i<6;i++) {
      const ang = i*Math.PI*2/6;
      ctx.beginPath();
      ctx.moveTo(cx2, cy2);
      ctx.lineTo(cx2+Math.cos(ang)*w*0.4, cy2+Math.sin(ang)*h*0.4);
      ctx.stroke();
    }
    setGlow('#5ab4ff',4);
    ctx.beginPath(); ctx.arc(cx2,cy2,4,0,Math.PI*2); ctx.fillStyle='#5ab4ff'; ctx.fill();
    clearGlow();
    if(sel){ ctx.strokeStyle='#ffff00'; ctx.lineWidth=2.5; ctx.strokeRect(x-2,y-2,w+4,h+4); }
  }
  function drawSwitch(x,y,w,h,sel) {
    ctx.fillStyle='#1a3320'; ctx.fillRect(x,y,w,h);
    ctx.strokeStyle='#00cc66'; ctx.strokeRect(x,y,w,h);
    for(let i=0;i<5;i++){ ctx.fillStyle='#00cc66'; ctx.fillRect(x+6+i*9, y+6,5,4); ctx.fillRect(x+6+i*9, y+h-12,5,4); }
    for(let i=0;i<5;i++){
      ctx.beginPath(); ctx.arc(x+8+i*9, y+h-5,2,0,Math.PI*2);
      ctx.fillStyle = i===2?'#ffcc00':(i===4?'#ff4444':'#00ff88');
      setGlow('#00ff88',2); ctx.fill(); clearGlow();
    }
    if(sel){ ctx.strokeStyle='#ffff00'; ctx.strokeRect(x-2,y-2,w+4,h+4); }
  }
  function drawPC(x,y,w,h,sel){
    ctx.fillStyle='#2a2a3a'; ctx.fillRect(x+5,y+5,w-15,h-10);
    ctx.strokeStyle='#aaaaff'; ctx.strokeRect(x+5,y+5,w-15,h-10);
    ctx.fillStyle='#3a3a4a'; ctx.fillRect(x+w-18,y+h/2,14,h/2);
    if(sel){ ctx.strokeStyle='#ffff00'; ctx.strokeRect(x-2,y-2,w+4,h+4); }
  }
  function drawFirewall(x,y,w,h,sel){
    ctx.fillStyle='#3a1a00'; ctx.fillRect(x,y,w,h);
    ctx.strokeStyle='#ff6600'; ctx.strokeRect(x,y,w,h);
    for(let r=0;r<3;r++){ let off=(r%2===0)?0:12; for(let c=0;c<2;c++){ ctx.fillStyle='#ff660033'; ctx.fillRect(x+6+c*30+off, y+8+r*14,20,8); ctx.strokeStyle='#ff6600'; ctx.strokeRect(x+6+c*30+off, y+8+r*14,20,8); } }
    setGlow('#ff8833',4); ctx.font="18px 'Segoe UI'"; ctx.fillStyle='#ff8833'; ctx.fillText("🔒", x+w/2-10, y+h/2+6); clearGlow();
    if(sel) ctx.strokeRect(x-2,y-2,w+4,h+4);
  }
  function drawServer(x,y,w,h,sel){
    ctx.fillStyle='#1a1a2e'; ctx.fillRect(x,y,w,h);
    ctx.strokeStyle='#9966ff'; ctx.strokeRect(x,y,w,h);
    for(let i=0;i<3;i++){ ctx.fillStyle='#2a1a4e'; ctx.fillRect(x+4,y+6+i*14,w-8,10); ctx.strokeStyle='#9966ff'; ctx.strokeRect(x+4,y+6+i*14,w-8,10);
      ctx.beginPath(); ctx.arc(x+w-12,y+11+i*14,3,0,Math.PI*2); ctx.fillStyle=(i===1)?'#00ff88':'#9966ff'; setGlow('#9966ff',2); ctx.fill(); clearGlow();
    }
    if(sel) ctx.strokeRect(x-2,y-2,w+4,h+4);
  }
  function drawCloud(x,y,w,h,sel){
    const cx=x+w/2, cy=y+h/2;
    ctx.beginPath();
    ctx.ellipse(cx-15,cy-5,18,14,0,0,Math.PI*2);
    ctx.ellipse(cx,cy-10,22,16,0,0,Math.PI*2);
    ctx.ellipse(cx+15,cy-5,18,14,0,0,Math.PI*2);
    ctx.ellipse(cx,cy+8,24,16,0,0,Math.PI*2);
    ctx.fillStyle='#0a2a3a'; ctx.fill();
    ctx.strokeStyle='#00ccff'; ctx.stroke();
    setGlow('#00ccff',2);
    for(let i=-1;i<=1;i++){ ctx.beginPath(); ctx.arc(cx+i*12,cy,3,0,Math.PI*2); ctx.fillStyle='#00ccff'; ctx.fill(); }
    clearGlow();
    if(sel) ctx.strokeRect(x-2,y-2,w+4,h+4);
  }
  function drawAP(x,y,w,h,sel){
    const cx=x+w/2, cy=y+h/2;
    for(let r=12;r<=30;r+=9){ ctx.beginPath(); ctx.arc(cx,cy-6,r,-0.8,0.8); ctx.strokeStyle='#ffcc00'; ctx.stroke(); }
    ctx.beginPath(); ctx.arc(cx,cy-6,6,0,Math.PI*2); ctx.fillStyle='#ffcc00'; ctx.fill();
    ctx.fillStyle='#2a2200'; ctx.fillRect(x+10,y+h-12,w-20,10);
    ctx.strokeStyle='#ffcc00'; ctx.strokeRect(x+10,y+h-12,w-20,10);
    if(sel) ctx.strokeRect(x-2,y-2,w+4,h+4);
  }

  function drawDevices() {
    devices.forEach(dev => {
      const x = dev.x-25, y = dev.y-20, w=50, h=40;
      const selected = (selectedDeviceId === dev.id);
      if (dev.type === 'router') drawRouter(x,y,w,h,selected);
      else if (dev.type === 'switch') drawSwitch(x,y,w,h,selected);
      else if (dev.type === 'pc') drawPC(x,y,w,h,selected);
      else if (dev.type === 'firewall') drawFirewall(x,y,w,h,selected);
      else if (dev.type === 'server') drawServer(x,y,w,h,selected);
      else if (dev.type === 'cloud') drawCloud(x,y,w,h,selected);
      else if (dev.type === 'accessPoint') drawAP(x,y,w,h,selected);
      ctx.font = 'bold 10px monospace';
      ctx.fillStyle = '#ccccff';
      ctx.fillText(dev.name, x+5, y-3);
      const conn = getConnector(dev);
      ctx.beginPath();
      ctx.arc(conn.x, conn.y, CONNECTOR_RADIUS, 0, Math.PI*2);
      ctx.fillStyle = '#5ab4ff';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.stroke();
      dev.__connector = conn;
    });
  }

  function drawLinks() {
    links.forEach(link => {
      const fromDev = devices.find(d => d.id === link.from);
      const toDev = devices.find(d => d.id === link.to);
      if (fromDev && toDev && fromDev.__connector && toDev.__connector) {
        ctx.beginPath();
        ctx.moveTo(fromDev.__connector.x, fromDev.__connector.y);
        ctx.lineTo(toDev.__connector.x, toDev.__connector.y);
        ctx.strokeStyle = '#88aaff';
        ctx.setLineDash([8,6]);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    });
  }

  let tempLink = null;
  function drawTempLink() {
    if (!tempLink) return;
    ctx.beginPath();
    ctx.moveTo(tempLink.startConnector.x, tempLink.startConnector.y);
    ctx.lineTo(tempLink.currentMouse.x, tempLink.currentMouse.y);
    ctx.strokeStyle = '#ffaa33';
    ctx.setLineDash([6,8]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  function render() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawLinks();
    drawDevices();
    drawTempLink();
  }

  // ----- INTERACTIONS -----
  function getMouseCoords(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width/rect.width;
    const scaleY = canvas.height/rect.height;
    let x = (e.clientX - rect.left) * scaleX;
    let y = (e.clientY - rect.top) * scaleY;
    x = Math.min(Math.max(0,x), canvas.width);
    y = Math.min(Math.max(0,y), canvas.height);
    return {x,y};
  }

  let dragDevice = null, dragOffX, dragOffY;
  function onMouseDown(e) {
    const {x,y} = getMouseCoords(e);
    // Check connector for link
    for (let dev of devices) {
      const conn = dev.__connector;
      if (conn && Math.hypot(x-conn.x, y-conn.y) <= 8) {
        tempLink = { startDevice: dev, startConnector: conn, currentMouse: {x,y} };
        e.preventDefault();
        return;
      }
    }
    // Otherwise drag device
    for (let dev of devices) {
      const rx = dev.x-25, ry = dev.y-20;
      if (x>=rx && x<=rx+50 && y>=ry && y<=ry+40) {
        dragDevice = dev;
        dragOffX = dev.x - x;
        dragOffY = dev.y - y;
        selectedDeviceId = dev.id;
        updateInspectorAndTerminal();
        render();
        break;
      }
    }
  }

  function onMouseMove(e) {
    const {x,y} = getMouseCoords(e);
    if (tempLink) {
      tempLink.currentMouse = {x,y};
      render();
      return;
    }
    if (dragDevice) {
      dragDevice.x = x + dragOffX;
      dragDevice.y = y + dragOffY;
      render();
    }
  }

  function onMouseUp(e) {
    if (tempLink) {
      const {x,y} = getMouseCoords(e);
      let target = null;
      for (let dev of devices) {
        if (dev.id === tempLink.startDevice.id) continue;
        const rx = dev.x-25, ry = dev.y-20;
        if (x>=rx && x<=rx+50 && y>=ry && y<=ry+40) { target = dev; break; }
      }
      if (target) {
        const exists = links.some(l => (l.from===tempLink.startDevice.id && l.to===target.id) || (l.from===target.id && l.to===tempLink.startDevice.id));
        if (!exists) {
          links.push({ from: tempLink.startDevice.id, to: target.id });
          reevaluateTasks();
          render();
        }
      }
      tempLink = null;
      render();
    }
    dragDevice = null;
  }

  canvas.addEventListener('mousedown', onMouseDown);
  window.addEventListener('mousemove', onMouseMove);
  window.addEventListener('mouseup', onMouseUp);

  canvas.addEventListener('click', (e) => {
    const {x,y} = getMouseCoords(e);
    let clicked = null;
    for (let dev of devices) {
      const rx = dev.x-25, ry = dev.y-20;
      if (x>=rx && x<=rx+50 && y>=ry && y<=ry+40) { clicked = dev.id; break; }
    }
    selectedDeviceId = clicked;
    updateInspectorAndTerminal();
    render();
  });

  // ----- INSPECTOR & TERMINAL -----
  const inspectorDiv = document.getElementById('inspectorContent');
  const terminalDiv = document.getElementById('terminal');
  const terminalOutput = document.getElementById('terminalOutput');
  const terminalInput = document.getElementById('terminalInput');

  function updateInspectorAndTerminal() {
    if (!selectedDeviceId) {
      inspectorDiv.innerHTML = 'Select a device';
      terminalDiv.style.display = 'none';
      return;
    }
    const dev = devices.find(d => d.id === selectedDeviceId);
    if (!dev) return;
    let html = `<strong>${dev.name}</strong> (${dev.type})<br>Interfaces:<ul>`;
    dev.interfaces.forEach(iface => { html += `<li>${iface.name}: ${iface.ip || 'unset'}</li>`; });
    html += `</ul>`;
    inspectorDiv.innerHTML = html;
    terminalDiv.style.display = 'flex';
    terminalOutput.innerHTML = `Connected to ${dev.name}\n> `;
    terminalInput.value = '';
    terminalInput.focus();
  }

  function executeCommand() {
    if (!selectedDeviceId) return;
    const cmd = terminalInput.value.trim().toLowerCase();
    const dev = devices.find(d => d.id === selectedDeviceId);
    let response = '';
    if (cmd === 'ipconfig') {
      response = dev.interfaces.map(i => `${i.name}: ${i.ip || 'unset'}`).join('\n');
      commandHistory.push({ deviceId: selectedDeviceId, command: 'ipconfig' });
      reevaluateTasks();
    } else if (cmd.startsWith('ping ')) {
      const targetName = cmd.split(' ')[1];
      const targetDev = devices.find(d => d.name === targetName || d.id === targetName);
      if (targetDev) {
        pingHistory.push({ from: selectedDeviceId, to: targetDev.id });
        response = `Ping to ${targetDev.name} successful`;
        reevaluateTasks();
      } else response = 'Device not found';
    } else response = 'Unknown command';
    terminalOutput.innerHTML += `<br>> ${cmd}<br>${response}<br>> `;
    terminalInput.value = '';
    terminalOutput.scrollTop = terminalOutput.scrollHeight;
  }

  terminalInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') executeCommand(); });

  // ----- UI UPDATES (Level Panel) -----
  function updateUI() {
    if (!currentLevel) return;
    document.getElementById('levelName').innerText = currentLevel.name;
    const taskDiv = document.getElementById('taskList');
    taskDiv.innerHTML = currentLevel.tasks.map(t => `<div class="task-item ${completedTasks.has(t.id) ? 'completed' : ''}">${t.desc}</div>`).join('');
    const allDone = currentLevel.tasks.every(t => completedTasks.has(t.id));
    document.getElementById('nextLevelBtn').style.display = allDone ? 'block' : 'none';
  }

  // ----- BUTTON HANDLERS -----
  function addDevice(type) {
    const x = 200 + Math.random() * 300;
    const y = 200 + Math.random() * 200;
    const newDev = createDevice(type, null, `${type}_${devices.length+1}`, x, y);
    devices.push(newDev);
    render();
    reevaluateTasks();
    showPopup(`Added ${type}`, 'success');
  }

  document.getElementById('btnAddRouter').onclick = () => addDevice('router');
  document.getElementById('btnAddSwitch').onclick = () => addDevice('switch');
  document.getElementById('btnAddPC').onclick = () => addDevice('pc');
  document.getElementById('btnAddFirewall').onclick = () => addDevice('firewall');
  document.getElementById('btnAddServer').onclick = () => addDevice('server');
  document.getElementById('btnAddCloud').onclick = () => addDevice('cloud');
  document.getElementById('btnAddAP').onclick = () => addDevice('accessPoint');

  document.getElementById('nextLevelBtn').onclick = () => {
    const next = allLevels.find(l => !completedLevels.has(l.id));
    if (next) loadLevel(next.id);
  };

  // Level Select Modal
  const modal = document.getElementById('levelSelectModal');
  const levelButtonsDiv = document.getElementById('levelButtons');
  function renderLevelButtons() {
    levelButtonsDiv.innerHTML = allLevels.map((level, idx) => `
      <button onclick="loadLevelFromButton('${level.id}')">${level.name} ${completedLevels.has(level.id) ? '✓' : ''}</button>
    `).join('');
  }
  window.loadLevelFromButton = (id) => { loadLevel(id); modal.classList.add('hidden'); };
  document.getElementById('levelSelectButton').onclick = () => { renderLevelButtons(); modal.classList.remove('hidden'); };
  document.getElementById('closeModal').onclick = () => modal.classList.add('hidden');

  // ----- INIT -----
  loadLevel('level1');
  render();
  console.log('Simulator running with Cisco icons');
})();
</script>
</body>
</html>
